<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School ID Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); }
        .status-badge { font-size: 0.75rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">School ID Management</a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3" id="user-info"></span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">School ID Records</h5>
                        <button class="btn btn-primary btn-sm" onclick="showCreateModal()" id="create-btn">Add New ID</button>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped" id="school-id-table">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Student ID</th>
                                        <th>Printed</th>
                                        <th>Released</th>
                                        <th>Reprinted</th>
                                        <th>Date Printed</th>
                                        <th>Date Released</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="school-id-tbody">
                                    <!-- Data will be loaded here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div class="modal fade" id="schoolIdModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-title">Add School ID</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="school-id-form">
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Student ID</label>
                            <input type="text" class="form-control" id="studentId" required>
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="printed">
                                <label class="form-check-label">Printed</label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="released">
                                <label class="form-check-label">Released</label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="reprinted">
                                <label class="form-check-label">Reprinted</label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Date Printed</label>
                            <input type="datetime-local" class="form-control" id="datePrinted">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Date Released</label>
                            <input type="datetime-local" class="form-control" id="dateReleased">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveSchoolId()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentUser = null;
        let editingId = null;

        // Check authentication on page load
        window.onload = function() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'index.html';
                return;
            }

            // Verify token and get user info
            fetch('/api/auth/verify', {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(response => response.json())
            .then(data => {
                if (data.user) {
                    currentUser = data.user;
                    document.getElementById('user-info').textContent = `${data.user.name || data.user.username} (${data.user.role})`;

                    // Hide create button if not personnel or higher
                    if (data.user.role !== 'admin' && data.user.role !== 'supervisor' && data.user.role !== 'personnel') {
                        document.getElementById('create-btn').style.display = 'none';
                    }

                    loadSchoolIds();
                } else {
                    localStorage.removeItem('token');
                    window.location.href = 'index.html';
                }
            })
            .catch(() => {
                localStorage.removeItem('token');
                window.location.href = 'index.html';
            });
        };

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }

        function loadSchoolIds() {
            fetch('/api/school-ids', {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    displaySchoolIds(data.data);
                } else {
                    alert('Error loading school IDs: ' + (data.error || 'Unknown error'));
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error loading school IDs');
            });
        }

        function displaySchoolIds(ids) {
            const tbody = document.getElementById('school-id-tbody');
            tbody.innerHTML = '';

            ids.forEach(id => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${id.name}</td>
                    <td>${id.studentId}</td>
                    <td><span class="badge bg-${id.printed ? 'success' : 'secondary'}">${id.printed ? 'Yes' : 'No'}</span></td>
                    <td><span class="badge bg-${id.released ? 'success' : 'secondary'}">${id.released ? 'Yes' : 'No'}</span></td>
                    <td><span class="badge bg-${id.reprinted ? 'success' : 'secondary'}">${id.reprinted ? 'Yes' : 'No'}</span></td>
                    <td>${id.datePrinted ? new Date(id.datePrinted).toLocaleDateString() : '-'}</td>
                    <td>${id.dateReleased ? new Date(id.dateReleased).toLocaleDateString() : '-'}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary me-1" onclick="editSchoolId('${id._id}')">Edit</button>
                        <button class="btn btn-sm btn-outline-success me-1" onclick="updatePrintStatus('${id._id}', !${id.printed})">Mark ${id.printed ? 'Not ' : ''}Printed</button>
                        <button class="btn btn-sm btn-outline-info me-1" onclick="updateReleaseStatus('${id._id}', !${id.released})">Mark ${id.released ? 'Not ' : ''}Released</button>
                        <button class="btn btn-sm btn-outline-warning me-1" onclick="updateReprintStatus('${id._id}', !${id.reprinted})">Mark ${id.reprinted ? 'Not ' : ''}Reprinted</button>
                        ${(currentUser.role === 'admin' || currentUser.role === 'supervisor' || currentUser.role === 'personnel') ? `<button class="btn btn-sm btn-outline-danger" onclick="deleteSchoolId('${id._id}')">Delete</button>` : ''}
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function showCreateModal() {
            if (currentUser.role !== 'admin' && currentUser.role !== 'supervisor' && currentUser.role !== 'personnel') {
                alert('Access denied');
                return;
            }

            editingId = null;
            document.getElementById('modal-title').textContent = 'Add School ID';
            document.getElementById('school-id-form').reset();
            new bootstrap.Modal(document.getElementById('schoolIdModal')).show();
        }

        function editSchoolId(id) {
            if (currentUser.role !== 'admin' && currentUser.role !== 'supervisor' && currentUser.role !== 'personnel') {
                alert('Access denied');
                return;
            }

            fetch(`/api/school-ids/${id}`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    editingId = id;
                    document.getElementById('modal-title').textContent = 'Edit School ID';
                    document.getElementById('name').value = data.data.name;
                    document.getElementById('studentId').value = data.data.studentId;
                    document.getElementById('printed').checked = data.data.printed;
                    document.getElementById('released').checked = data.data.released;
                    document.getElementById('reprinted').checked = data.data.reprinted;
                    document.getElementById('datePrinted').value = data.data.datePrinted ? new Date(data.data.datePrinted).toISOString().slice(0, 16) : '';
                    document.getElementById('dateReleased').value = data.data.dateReleased ? new Date(data.data.dateReleased).toISOString().slice(0, 16) : '';
                    new bootstrap.Modal(document.getElementById('schoolIdModal')).show();
                }
            });
        }

        function saveSchoolId() {
            const data = {
                name: document.getElementById('name').value,
                studentId: document.getElementById('studentId').value,
                printed: document.getElementById('printed').checked,
                released: document.getElementById('released').checked,
                reprinted: document.getElementById('reprinted').checked,
                datePrinted: document.getElementById('datePrinted').value || null,
                dateReleased: document.getElementById('dateReleased').value || null
            };

            const method = editingId ? 'PUT' : 'POST';
            const url = editingId ? `/api/school-ids/${editingId}` : '/api/school-ids';

            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    bootstrap.Modal.getInstance(document.getElementById('schoolIdModal')).hide();
                    loadSchoolIds();
                } else {
                    alert('Error saving school ID: ' + (data.error || 'Unknown error'));
                }
            });
        }

        function updatePrintStatus(id, printed) {
            fetch(`/api/school-ids/${id}/print`, {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                },
                body: JSON.stringify({ printed, datePrinted: printed ? new Date() : null })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    loadSchoolIds();
                } else {
                    alert('Error updating print status');
                }
            });
        }

        function updateReleaseStatus(id, released) {
            fetch(`/api/school-ids/${id}/release`, {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                },
                body: JSON.stringify({ released, dateReleased: released ? new Date() : null })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    loadSchoolIds();
                } else {
                    alert('Error updating release status');
                }
            });
        }

        function updateReprintStatus(id, reprinted) {
            fetch(`/api/school-ids/${id}/reprint`, {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                },
                body: JSON.stringify({ reprinted })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    loadSchoolIds();
                } else {
                    alert('Error updating reprint status');
                }
            });
        }

        function deleteSchoolId(id) {
            if (!confirm('Are you sure you want to delete this school ID?')) return;

            fetch(`/api/school-ids/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    loadSchoolIds();
                } else {
                    alert('Error deleting school ID');
                }
            });
        }
    </script>
</body>
</html>
